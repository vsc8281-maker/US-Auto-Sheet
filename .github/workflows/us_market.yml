name: Update US Stocks to Google Sheet
on:
  schedule:
    # 22:30 UTC का मतलब है भारत के सुबह 4:00 बजे (US बाज़ार बंद होने के बाद)
    - cron: '30 22 * * 1-5'
  workflow_dispatch:
jobs:
  update-sheet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install gspread oauth2client pandas requests yfinance lxml html5lib

      - name: Run Python Script
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python update_sheet.py
